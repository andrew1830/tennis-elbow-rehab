<div id="app"></div>
<script>

// ═══════════════════════════════════════════════════════════
//  1. CONSTANTS & DATA
// ═══════════════════════════════════════════════════════════

const SK  = "te-rehab-v5";
const SKS = "te-rehab-v5-session";

const WEEKS = 12;
const DAYS  = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const TD    = [0,2,4]; // training day indices (Mon, Wed, Fri)

// Exercise definitions (shared across phases)
const EX_DEF = {
ext: {
id:"ext", name:"Wrist Extension Isometric", icon:"💪",
vid:"MYd74BTpqBs",
vidTitle:"Wrist Extension Isometric — How To",
},
sup: {
id:"sup", name:"Wrist Supination Isometric", icon:"🔄",
vid:"bS3le7kusSg",
vidTitle:"Wrist Supination Isometric — How To",
},
grip: {
id:"grip", name:"Grip / Forearm Isometric", icon:"✊",
vid:"RJf3s7r6GPU",
vidTitle:"How to: Grip Isometric Hold",
},
};

const PHASES = [
{
label:"Phase 1: Foundation", weeks:"Weeks 1–3", range:[1,3],
bg:"#dbeafe", border:"#93c5fd", hdr:"#3b82f6",
exercises:[
{ ...EX_DEF.ext, sets:3,
how:"Forearm resting on a table, palm down, hand hanging off the edge. Hold a dumbbell with your wrist extended upward. Keep your wrist still and hold for 30 seconds." },
],
note:"One exercise only. Focus on form and finding your working weight. Pain up to 4/10 is OK.",
},
{
label:"Phase 2: Build", weeks:"Weeks 4–7", range:[4,7],
bg:"#fef3c7", border:"#fcd34d", hdr:"#f59e0b",
exercises:[
{ ...EX_DEF.ext, sets:4,
how:"Forearm on table, palm down, hand off edge. Hold a dumbbell with wrist extended upward. Keep your wrist still and hold for 30 seconds." },
{ ...EX_DEF.sup, sets:3,
how:"Elbow bent at 90°, tucked at your side. Hold a hammer or dumbbell with your palm facing up. Resist any rotation and hold the position for 30 seconds." },
],
note:"Add second exercise. Increase weight if 30s feels easy. Check pain baseline each morning.",
},
{
label:"Phase 3: Strengthen", weeks:"Weeks 8–12", range:[8,12],
bg:"#dcfce7", border:"#86efac", hdr:"#22c55e",
exercises:[
{ ...EX_DEF.ext, sets:5,
how:"Forearm on table, palm down, hand off edge. Hold a dumbbell with wrist extended upward. Hold for 30 seconds." },
{ ...EX_DEF.sup, sets:4,
how:"Elbow at 90°, arm at side. Hold a hammer/dumbbell with palm up. Resist rotation for 30 seconds." },
{ ...EX_DEF.grip, sets:3,
how:"Grip a thick dumbbell handle or weight firmly at max effort. Keep arm relaxed at your side and hold the squeeze for 30 seconds." },
],
note:"All three exercises. Reintroduce light pickleball when pain is consistently ≤2/10.",
},
];

const RULES = [
{ icon:"⏱️", title:"30-second holds",
desc:"The minimum for the tendon stress-relaxation response that triggers healing. Don't cut sets short — the full 30s is where the magic happens." },
{ icon:"💪", title:"~70% of max effort",
desc:"Holds must be genuinely challenging. Light holds don't provide enough stimulus. Use the My Loads tab to calculate your exact 70% training weight." },
{ icon:"📅", title:"Every other day only",
desc:"Train Mon/Wed/Fri (or any every-other-day pattern). Rest days are essential — net collagen synthesis peaks ~36 hours after loading. Off days are when the tendon rebuilds." },
{ icon:"😬", title:"Pain up to 4/10 is OK",
desc:"Some discomfort during the hold is acceptable. The critical rule: pain must return to its normal baseline within 24 hours. If worse next morning, reduce load or sets." },
{ icon:"🍋", title:"Collagen + vitamin C before",
desc:"15g gelatin + 225mg vitamin C taken 30–60 min before training boosts collagen synthesis. Exercise then drives those amino acids directly to the loaded tendon." },
{ icon:"🏓", title:"Reduce pickleball",
desc:"Fast explosive loading (backhands, hard dinking, smashes) stress-shields the damaged area and prevents healing. Cut back significantly — especially any motion that provokes pain." },
{ icon:"📈", title:"Progress takes weeks, not days",
desc:"Expect 6–12 weeks for meaningful improvement. Research showed full tendon remodeling in as little as 2 months when the protocol was followed correctly and consistently." },
{ icon:"🔁", title:"Advance your weights regularly",
desc:"Re-test your max every 2–3 weeks. When 30 seconds starts to feel easy, your tendon is getting stronger — update your loads in the My Loads tab and increase the weight." },
];

// ═══════════════════════════════════════════════════════════
//  2. STATE
// ═══════════════════════════════════════════════════════════

const DEF = {
currentWeek:  1,
sessionLog:   {},
checks:       {}, // pre/post workout checks per session (persisted)
loads:        { ext:"", sup:"", grip:"", unit:"lbs" },
};

let S = { ...DEF }; // main persisted state
let tab = "tracker";
let lastSaved = null;

// Session-only (not persisted across days, but restored within same day)
let sets = {}; // exId -> completed set count today

// ═══════════════════════════════════════════════════════════
//  3. STORAGE
// ═══════════════════════════════════════════════════════════

function persist() {
try {
localStorage.setItem(SK, JSON.stringify({
currentWeek: S.currentWeek,
sessionLog:  S.sessionLog,
checks:      S.checks,
loads:       S.loads,
}));
lastSaved = new Date().toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
return true;
} catch(_) { return false; }
}

function hydrate() {
try {
const raw = localStorage.getItem(SK);
if (raw) S = { ...DEF, ...JSON.parse(raw) };
} catch(_) {}

// Session sets: restore if same day, else start fresh
try {
const sr = localStorage.getItem(SKS);
if (sr) {
const sd = JSON.parse(sr);
if (sd.date === new Date().toDateString()) sets = sd.sets || {};
}
} catch(_) {}
}

function persistSets() {
try {
localStorage.setItem(SKS, JSON.stringify({ date: new Date().toDateString(), sets }));
} catch(_) {}
}

// ═══════════════════════════════════════════════════════════
//  4. AUDIO
// ═══════════════════════════════════════════════════════════

let _audioCtx;
function getAudioCtx() {
if (!_audioCtx || _audioCtx.state === 'closed') {
_audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
if (_audioCtx.state === 'suspended') _audioCtx.resume();
return _audioCtx;
}

// Must be called from a user gesture (tap).
// Plays a near-silent oscillator tone through the same node path as beep()
// to fully unlock the iOS WebKit audio pipeline.
function unlockAudio() {
try {
const ctx = getAudioCtx();
const o = ctx.createOscillator(), g = ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.frequency.value = 440;
g.gain.setValueAtTime(0.001, ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.05);
} catch(_) {}
}

// Prevent iOS from auto-suspending the AudioContext during long silent gaps.
function keepAudioAlive() {
try {
if (!_audioCtx || _audioCtx.state === 'closed') return;
if (_audioCtx.state === 'suspended') _audioCtx.resume();
const o = _audioCtx.createOscillator(), g = _audioCtx.createGain();
o.connect(g); g.connect(_audioCtx.destination);
g.gain.setValueAtTime(0.001, _audioCtx.currentTime);
o.start(_audioCtx.currentTime); o.stop(_audioCtx.currentTime + 0.001);
} catch(_) {}
}

function vib(ms=50) { try { navigator.vibrate(ms); } catch(_) {} }

function beep(f=660, d=0.25) {
try {
const ctx = getAudioCtx();
const o = ctx.createOscillator(), g = ctx.createGain();
o.connect(g); g.connect(ctx.destination);
o.frequency.value = f;
g.gain.setValueAtTime(0.35, ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d);
o.start(ctx.currentTime); o.stop(ctx.currentTime + d);
} catch(_) {}
}

function endToneHold() {
// Two rising tones — signals "hold done, rest starting"
beep(660, 0.4);
setTimeout(() => beep(880, 0.6), 300);
vib(200);
}

function endToneRest() {
// Three ascending tones — signals "rest done, next set"
[523, 659, 880].forEach((f, i) => setTimeout(() => beep(f, 0.45), i * 200));
vib(200);
}

// ═══════════════════════════════════════════════════════════
//  5. TIMER
// ═══════════════════════════════════════════════════════════

const T = { active:false, exId:null, type:null, remaining:0, duration:0, endTime:0, lastBeep:-1, iv:null };
const W = { active:false, remaining:0, duration:120, endTime:0, iv:null };

function wStart() {
if (W.active) return;
unlockAudio();
clearInterval(W.iv);
W.active = true; W.duration = 120;
W.endTime = Date.now() + W.duration * 1000;
W.remaining = W.duration;
render();
wTick();
W.iv = setInterval(wTick, 250);
}

function wTick() {
W.remaining = Math.max(0, Math.ceil((W.endTime - Date.now()) / 1000));
wDOM();
if (W.remaining <= 0) wDone();
}

function wDone() {
clearInterval(W.iv); W.iv = null; W.active = false;
beep(660, 0.4); setTimeout(() => beep(880, 0.6), 300); vib(300);
if (!S.checks.warmup) setState({ checks: { ...S.checks, warmup: true } });
else render();
}

function wCancel() {
clearInterval(W.iv); W.iv = null; W.active = false;
render();
}

function wDOM() {
const numEl = document.getElementById('w-num');
const barEl = document.getElementById('w-bar');
if (numEl) { const m = Math.floor(W.remaining/60), s = W.remaining%60; numEl.textContent = m+':'+String(s).padStart(2,'0'); }
if (barEl) { barEl.style.width = Math.round(((W.duration - W.remaining) / W.duration) * 100) + '%'; }
}

function tStart(exId, type) {
tClear();
unlockAudio();                    // unlock audio on user tap (iOS)
T.active = true; T.exId = exId; T.type = type;
T.duration = type === 'hold' ? 30 : 60;
T.endTime = Date.now() + T.duration * 1000;
T.remaining = T.duration;
T.lastBeep = -1;
render();
tTick();
T.iv = setInterval(tTick, 250);
}

function tTick() {
const prev = T.remaining;
T.remaining = Math.max(0, Math.ceil((T.endTime - Date.now()) / 1000));
tDOM();
keepAudioAlive();
if (T.remaining <= 3 && T.remaining > 0 && T.remaining !== T.lastBeep) {
T.lastBeep = T.remaining;
beep(300 + T.remaining * 80, 0.15);
vib(50);
}
if (T.remaining <= 0) tDone();
}

function tDone() {
tClear();
// Trigger completion flash on the timer box before it gets replaced
const box = document.getElementById('t-box');
if (box) { box.classList.remove('pulse'); box.classList.add('done-flash'); }
const exId = T.exId, type = T.type;
if (type === 'hold') {
endToneHold();
T.active = true; // keep active for rest
tStart(exId, 'rest');
} else {
endToneRest();
T.active = false; T.exId = null; T.type = null;
sets[exId] = (sets[exId] || 0) + 1;
persistSets();
render();
}
}

function tSkip() {
const exId = T.exId, type = T.type;
tClear(); T.active = false;
if (type === 'hold') {
tStart(exId, 'rest');
} else {
T.exId = null; T.type = null;
sets[exId] = (sets[exId] || 0) + 1;
persistSets();
render();
}
}

function tCancel() {
tClear(); T.active = false; T.exId = null; T.type = null;
render();
}

function tClear() { clearInterval(T.iv); T.iv = null; }

function tDOM() {
const r = T.remaining, d = T.duration, type = T.type;
const warn = r <= 5;
const countdown = r <= 3 && r > 0;
const el = id => document.getElementById(id);
const box = el('t-box'); const num = el('t-num'); const bar = el('t-bar'); const lbl = el('t-lbl');
if (box) {
box.className = 'timer-box ' + type + (countdown ? ' pulse' : '');
}
if (num) {
num.textContent = r + 's';
const cls = 'timer-num ' + (warn ? 'warn' : type);
if (countdown && r !== T.lastBeep) {
// Restart pop animation by removing and re-adding class
num.className = cls;
void num.offsetWidth;
num.className = cls + ' pop';
} else if (!countdown) {
num.className = cls;
}
}
if (bar) {
bar.style.width = Math.round(((d - r) / d) * 100) + '%';
}
if (lbl) {
if (type === 'hold') lbl.textContent = warn ? '⚡ Almost there!' : '🏋️ Holding…';
else lbl.textContent = warn ? '⚡ Get ready!' : '😮‍💨 Resting…';
}
}

// ═══════════════════════════════════════════════════════════
//  6. RENDER ENGINE
// ═══════════════════════════════════════════════════════════

function render() {
// Snapshot focus and scroll state before wiping DOM
const ae = document.activeElement;
const focId = ae ? ae.id : null;
const focSel = (ae && ae.selectionStart != null) ? ae.selectionStart : null;
const scrollY = window.scrollY;

document.getElementById('app').innerHTML = buildApp();

// Restore scroll position
window.scrollTo(0, scrollY);

// Restore focus & cursor
if (focId) {
const el = document.getElementById(focId);
if (el) {
el.focus({ preventScroll: true });
if (focSel != null) { try { el.setSelectionRange(focSel, focSel); } catch(_){} }
}
}

// Resume timer DOM if active
if (T.active) tDOM();
if (W.active) wDOM();
}

function setState(patch) {
Object.assign(S, patch);
persist();
render();
}

? `<a href="${vidCardURL}" target="_blank" rel="noopener" class="vid-card" style="margin-top:10px"> <div class="vid-thumb"> <img src="https://img.youtube.com/vi/${ex.vid}/mqdefault.jpg" alt=""/> <div class="vid-play"><div class="vid-play-icon"><span>▶</span></div></div> </div> <div class="vid-info"><p>${ex.vidTitle}</p><span>YouTube · tap to watch</span></div> </a>`
: `<a href="https://www.youtube.com/results?search_query=${ex.search}" target="_blank" rel="noopener" class="vid-search" style="margin-top:10px"> <div class="vid-search-icon">▶</div> <div class="vid-search-info"><p>${ex.vidTitle}</p><span>Find demo videos on YouTube</span></div> </a>`;
return ` <div class="calc-card"> <h4>${ex.icon} ${ex.label}</h4> <p class="calc-how">${ex.how}</p> <p class="calc-lbl">My max (${unit})</p> <div class="input-row"> <input type="number" id="input-${ex.id}" inputmode="decimal" min="0" step="0.5" value="${raw}" placeholder="${unit==='lbs'?'e.g. 20':'e.g. 10'}" oninput="setLoad('${ex.id}',this.value)"/> <span>${unit}</span> </div> ${result} ${vidCard} </div>`;
}).join('');

return ` <div class="info-box"> <h3>How to Find Your Max (One-Time Test)</h3> <ol> <li>Pick up a dumbbell in your injured hand.</li> <li>Set up in the exercise position (see demos below).</li> <li>Hold at max effort for <strong>5 seconds</strong>.</li> <li>Too easy → add weight. Can't hold → reduce weight.</li> <li>Heaviest held with good form for 5s = your max.</li> <li>Your training weight = <strong>70% of that number</strong>.</li> </ol> <p class="tip">Re-test every 2–3 weeks as you get stronger and update below.</p> </div> <div class="unit-row"> <span>Units:</span> <button class="unit-btn${unit==='lbs'?' on':''}" onclick="setUnit('lbs')">lbs</button> <button class="unit-btn${unit==='kg'?' on':''}"  onclick="setUnit('kg')">kg</button> </div> ${cards} <div class="warn-box"><strong>📈 Tip:</strong> When 30s holds start feeling easy, re-test your max — it's likely gone up. Update your numbers here to keep training at the right intensity.</div>`;
}

// ═══════════════════════════════════════════════════════════
//  RULES TAB
// ═══════════════════════════════════════════════════════════

function buildRules() {
const sources = ` <div class="sources-card"> <h3>About This Protocol</h3> <a href="https://youtu.be/GvxD0zn6-B4" target="_blank" rel="noopener" class="source-link"> <div class="src-icon">🎬</div> <div class="src-text"> <p>Why Your Tendons Are Weak: The Science of Building Tendon Strength</p> <span>The Movement System · YouTube — the video that inspired this app</span> </div> </a> <a href="https://pubmed.ncbi.nlm.nih.gov/25979840/" target="_blank" rel="noopener" class="source-link"> <div class="src-icon">📄</div> <div class="src-text"> <p>Isometric exercise induces analgesia in tendinopathy</p> <span>Rio et al. 2015 · British Journal of Sports Medicine — supports isometric holds</span> </div> </a> <a href="https://www.ncbi.nlm.nih.gov/pmc/articles/PMC5183725/" target="_blank" rel="noopener" class="source-link"> <div class="src-icon">📄</div> <div class="src-text"> <p>Vitamin C–enriched gelatin augments collagen synthesis</p> <span>Shaw et al. 2017 · AJCN — supports collagen + vitamin C supplementation</span> </div> </a> <a href="https://pubmed.ncbi.nlm.nih.gov/31577524/" target="_blank" rel="noopener" class="source-link"> <div class="src-icon">📄</div> <div class="src-text"> <p>Isometric exercise vs. wait-and-see for lateral elbow tendinopathy</p> <span>Vuvan et al. 2020 · Med Sci Sports Exerc — supports isometric protocol</span> </div> </a> </div>`;
return sources + RULES.map(r => ` <div class="rule"> <div class="rule-icon">${r.icon}</div> <div><p class="rule-title">${r.title}</p><p class="rule-desc">${r.desc}</p></div> </div>`).join('');
}

// ═══════════════════════════════════════════════════════════
//  8. HELPERS & EVENT HANDLERS
// ═══════════════════════════════════════════════════════════

function phaseFor(w) {
return PHASES.find(p => w >= p.range[0] && w <= p.range[1]) || PHASES[2];
}

function calc70(rawStr) {
const n = parseFloat(rawStr);
if (!rawStr || isNaN(n) || n <= 0) return null;
return Math.round(n * 0.70 * 2) / 2; // round to nearest 0.5
}

function escHtml(s) {
return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function setTab(t)     { tab = t; render(); }
function setWeek(w)    { setState({ currentWeek: w }); }
function setUnit(u)    { setState({ loads: { ...S.loads, unit: u } }); }

function setLoad(id, v) {
// Update state directly — focus is preserved via render()'s focus restoration
S.loads = { ...S.loads, [id]: v };
persist();
render();
}

function toggleDay(week, di) {
const key = `${week}-${di}`;
setState({ sessionLog: { ...S.sessionLog, [key]: !S.sessionLog[key] } });
}

function toggleCheck(id) {
setState({ checks: { ...S.checks, [id]: !S.checks[id] } });
}

function resetChecks() {
setState({ checks: {} });
}

function undoSet(exId) {
sets[exId] = Math.max(0, (sets[exId] || 0) - 1);
persistSets();
render();
}

function resetExercise(exId) {
sets[exId] = 0;
persistSets();
render();
}

function exportData() {
const data = JSON.stringify({ version: SK, state: S, sets, exportDate: new Date().toISOString() }, null, 2);
const blob = new Blob([data], { type: 'application/json' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = `tennis-elbow-backup-${new Date().toISOString().slice(0,10)}.json`;
a.click();
URL.revokeObjectURL(url);
}

function importData() {
const input = document.createElement('input');
input.type = 'file';
input.accept = '.json';
input.onchange = e => {
const file = e.target.files[0];
if (!file) return;
if (file.size > 512 * 1024) { alert('Backup file is too large (max 512 KB).'); return; }
const reader = new FileReader();
reader.onload = evt => {
try {
const data = JSON.parse(evt.target.result);
if (!data.state || typeof data.state !== 'object' || !data.version) { alert('Invalid backup file.'); return; }
// Build a clean state from an explicit whitelist of known keys to prevent prototype pollution
const safeState = {};
for (const key of ['currentWeek','sessionLog','checks','loads']) {
if (Object.prototype.hasOwnProperty.call(data.state, key)) safeState[key] = data.state[key];
}
if (typeof safeState.currentWeek !== 'number' || safeState.currentWeek < 1 || safeState.currentWeek > WEEKS) safeState.currentWeek = DEF.currentWeek;
if (typeof safeState.loads !== 'object' || !safeState.loads) safeState.loads = { ...DEF.loads };
if (typeof safeState.sessionLog !== 'object' || !safeState.sessionLog) safeState.sessionLog = {};
if (typeof safeState.checks !== 'object' || !safeState.checks) safeState.checks = {};
// Build a clean sets object restricted to known exercise IDs
let safeSets = {};
if (data.sets && typeof data.sets === 'object') {
const knownIds = Object.keys(EX_DEF);
for (const id of knownIds) {
if (Object.prototype.hasOwnProperty.call(data.sets, id)) safeSets[id] = data.sets[id];
}
}
const rawDate = data.exportDate;
const parsedDate = rawDate && !isNaN(new Date(rawDate)) ? new Date(rawDate).toLocaleDateString() : 'unknown date';
if (!confirm(`Restore backup from ${parsedDate}? This will replace your current data.`)) return;
S = { ...DEF, ...safeState };
sets = safeSets;
persist();
persistSets();
render();
} catch(_) { alert('Could not read backup file.'); }
};
reader.readAsText(file);
};
input.click();
}

function resetAll() {
if (!confirm("Reset ALL progress? This cannot be undone.")) return;
tCancel();
S = { ...DEF };
sets = {};
lastSaved = null;
persist();
persistSets();
render();
}

// ═══════════════════════════════════════════════════════════
//  9. BOOT
// ═══════════════════════════════════════════════════════════

hydrate();
render();

if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js').catch(() => {});
}

</script>
